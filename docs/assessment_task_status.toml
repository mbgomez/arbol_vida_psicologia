[lessons_learned]
items = [
  "Do not tighten local JSON contracts without providing backward-safe defaults when seeded sections are still arriving gradually.",
  "Home should communicate user value, not repository or product-progress status.",
  "Home works better when in-progress continuation and latest-completed reflection are treated as separate surfaces rather than one blended summary card.",
  "A dedicated per-sephira detail route adds real product value and makes Results feel less like a terminal dashboard.",
  "Keeping result-detail content in the same seeded questionnaire pipeline is simpler than inventing a second local content system.",
  "The moment the product wants to signal a real multi-assessment future, including user-authored assessments, a top-level Assessments tab becomes a product statement rather than unnecessary shell noise.",
  "History is the right long-term home for graphs because it already owns completed-session re-entry and time-based reflection.",
  "The first History graph slice is stronger when it locks a small chart-ready metric contract instead of overreaching into dashboard behavior.",
  "The lightweight History trend section works best as the entry point, with deeper chart exploration moved onto a secondary screen instead of crowding the main saved-session surface.",
  "Explicit by-sephira and by-score-type modes keep the deeper trends experience easier to read than one overloaded graph control.",
  "Starting a fresh assessment is a trust-sensitive moment, so the app should confirm before replacing an unfinished session and should preserve completed History entries.",
  "Fresh-start behavior is safest when the route carries an explicit intent and the repository owns the replacement semantics, instead of each screen trying to reset assessment state on its own.",
  "Coverage for trust-sensitive flow changes is strongest when it spans repository behavior, route/use-case wiring, ViewModel state, and the visible confirmation path on production surfaces.",
  "Tester analytics are most useful when they stay narrowly focused on the core journey and key recoverable failures instead of trying to measure everything at once.",
  "Crash and telemetry instrumentation should respect the product's privacy posture and be explained clearly once tester-distribution work begins.",
  "A small app-owned telemetry layer keeps the event contract stable and lets Firebase be enabled only for tester builds instead of becoming a hidden requirement for every local build.",
  "When connected Compose tests all fail with `No compose hierarchies found`, check the device or emulator state first. In this thread, Android test-device settings were the cause rather than the new feature code.",
  "Firebase backend initialization logs and local Timber telemetry are not the same as end-to-end Analytics DebugView or Crashlytics console confirmation. Treat those as separate verification checkpoints.",
  "Play internal testing rollout can be blocked by account identity verification even after a signed release bundle is ready, so the release artifact and the console-compliance step should be tracked separately.",
  "For local Windows setup, invoking adb, keytool, and Gradle by absolute path can be faster than assuming PATH or JAVA_HOME are already configured.",
  "Per-sephira visibility toggles in score-type trend mode are a UI concern, so filtering the chart-ready screen model locally is cleaner than pushing transient selection state into repository contracts.",
  "Dynamic graph screens are easier to keep stable when test tags target specific controls and saved-point rows instead of relying on repeated sephira names in visible text.",
  "Five-tab bottom navigation needs explicit label-fit handling early; letting long labels wrap creates obvious UX debt on smaller phones.",
  "Assessment exit confirmation has to name the actual destination in both the body and the confirm action or the shell feels untrustworthy.",
  "Footer copy on production browsing surfaces should describe the user's experience, not the team's rollout structure.",
  "Once nested content screens become real product destinations, their loading, locked, and recovery states need the same visual tone as the rest of the app or the transition into detail feels abrupt.",
  "Small copy shifts away from 'should', 'will', and rollout language make trust-sensitive surfaces feel more present and less like staged product scaffolding.",
  "Section-complete assessment interpretation is part of the authored content contract, not just a UI copy problem. If it is not modeled per sephira in content, later sephirot will inherit accidental Malkuth assumptions.",
  "Debug/demo tools for completed-history review should switch sources instead of seeding or overwriting real saved data.",
  "Compose tests for long polished screens like History and Settings should scroll to below-the-fold content or rely on stable semantics instead of assuming those sections stay immediately visible.",
  "Scoring tests are more reliable when weighted fixtures stay comfortably away from confidence and dominant-pole thresholds unless the test is intentionally validating a boundary.",
  "Phase 2 polish on History is stronger when recovery states can retry in place instead of always pushing the user out to another tab.",
  "Trend visuals feel calmer when latest context, previous context, and readable point details stay visible together instead of asking the user to infer too much from the chart alone.",
  "For chart screens, y-axis labels such as 100, 50, and 0 should visually belong to the graph area rather than sit as detached text above or below it.",
  "Small support-list bullets on multiline cards need manual visual review; simple top or center alignment often looks wrong once the text wraps.",
  "Compose Canvas draw lambdas should receive plain values from composable scope. Looking up theme colors directly inside draw blocks can break compilation.",
  "When a section-complete reflection bug appears in one sephira, assume the content contract may be incomplete rather than treating it as an isolated copy fix. Lock the JSON/content shape before resuming broader UX polish.",
  "A repository fallback is not enough if the seed DTO still requires the field at parse time. Optional authored JSON fields need optional/defaulted DTO fields too.",
  "When a seeded content contract changes, update test JSON, local seed builders, and constructor call sites in the same pass or the next failure will often come from tests rather than production code.",
  "For cached questionnaire changes, manual verification should include a fresh install or cleared app data so the new content version and Room cache path are exercised together.",
  "When Home or other polished top-level surfaces gain richer state content, expect lower cards to move below the initial viewport and update Compose tests to scroll instead of freezing the original fold height.",
  "If completed-state copy is intentionally reused in more than one section, tighten Compose selectors to stable position, tags, or count-aware assertions rather than treating duplicate text as an app regression.",
  "A lightweight execution layer works best when it complements the human docs instead of replacing them. Keep product standards in AGENTS and the docs, and use `.codex` files only for cheap orientation and task routing.",
  "Token savings are strongest when future threads load only `AGENTS.md`, `.codex/project_map.md`, and the one or two mini-agents relevant to the slice.",
  "Reusable prompt templates should preserve existing project constraints instead of introducing a second conflicting rule set.",
  "If a hidden debug gesture depends on tap timing, prefer a small pure helper plus deterministic unit tests for the timing rule and keep Compose coverage focused on the visible reveal behavior.",
  "For polished bilingual Settings-style rows, top-align controls with multiline copy instead of centering them; centered switches, radios, and action buttons start to look off once Spanish text wraps.",
  "When a section-complete screen already receives authored reflection and practice from the content contract, Phase 2 polish should improve readability around that content rather than restating the same meaning in extra cards.",
  "Assessment loading and recovery surfaces feel more trustworthy when they use the same card-based visual language as other production surfaces instead of dropping back to bare centered indicators or text blocks.",
  "For reflective result screens, confidence explanation and numeric score breakdown read better as a dedicated supporting surface beneath the authored interpretation, not as one dense paragraph.",
  "A section-complete assessment result can become too lean even when the progressive-disclosure direction is correct. The strongest balance is a concise but emotionally rewarding mid-flow result paired with a clearly richer dedicated detail screen.",
  "AssessmentScreen refactors are safest when terminal phases such as loading, completed, and error are extracted as screen-owned UI sections first. This thins the orchestrator without pushing presentation-only mapping or screen flow decisions into ViewModel or shared component layers too early.",
  "When a screen decomposition preserves user-visible behavior, add focused tests at the newly extracted UI seams instead of rewriting broader flow coverage. That keeps Phase 3 refactor protection strong without turning stable screen tests into unnecessary churn.",
  "If Settings exposes both a persisted visibility toggle and a manual reopen action for the same note, those interactions should be separated visually and behaviorally so toggling never opens the note by accident.",
  "Top-level tab navigation is more trustworthy when it first pops back to an existing destination before falling back to generic navigate-with-restore behavior; otherwise deep stacks can rebound through the wrong tab after assessment exit.",
  "When refactoring a ViewModel around assessment resume behavior, verify the repository snapshot path as well as the screen-state mapper. Resume regressions can come from persistence layers dropping saved scores even when the new UI-state logic looks correct in isolation.",
  "Section-complete resume is a real persisted assessment state, not just an in-memory UI convenience. If an in-progress session already has a saved score for the current sephira, resume should restore the section-complete result before advancing."
]

