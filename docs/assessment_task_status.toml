version = 1
project = "Numyah Mind"
updated_utc = "2026-03-22"
purpose = "Assessment continuation status for future product threads"

[current_state]
summary = "Home now shows latest reflection value, Results has per-sephira detail, History opens saved result overviews, Learn is present, Settings is present, assessment supports multi-sephira progression across the seeded set."
status = "stable_after_tests_and_manual_checks"

[recent_work]
completed = [
  "Removed builder-style value-less home progress card",
  "Added Home summary driven by latest completed assessment",
  "Added last assessment date and relative days-since text on Home",
  "Added per-sephira results detail screen and navigation",
  "Extended seeded assessment content shape with detailContent",
  "Added safe JSON fallbacks so unfinished seeded sections still load",
  "Updated tests for Home, Results detail, repository content mapping, and viewmodels"
]

[locked_decisions]
home_top_level_tabs = ["Home", "History", "Learn", "Settings"]
assessment_library_top_level_tab = false
assessment_library_direction = "Do not add a top-level Assessments tab yet. When multiple assessments exist, introduce an assessment library screen behind the current Start assessment entry."
result_detail_content_shape = ["healthyExpression", "deficiencyPattern", "excessPattern", "suggestedPractices"]
result_detail_content_fallbacks = "If seeded sections omit detail fields, repository falls back to shortMeaning/introText/empty practices so the app remains stable while content is authored gradually."
history_behavior = "History remains the surface for completed sessions and opens the saved results overview for that exact session."

[recommended_next_slice]
name = "assessment_resume_and_library_entry_polish"
why = "The strongest next value is making Home distinguish between resuming an in-progress assessment and reopening the latest completed reflection, while keeping the future path open for multiple assessments."

[[recommended_next_slice.goals]]
id = "resume_state_on_home"
description = "If an assessment is in progress, Home should prioritize resume context over latest-completed summary."

[[recommended_next_slice.goals]]
id = "separate_resume_vs_latest"
description = "Keep Resume assessment and View latest results as clearly distinct actions."

[[recommended_next_slice.goals]]
id = "future_assessment_library_path"
description = "Shape Start assessment so it can later route to an assessment library screen without redesigning the shell."

[future_options]
assessment_library_screen = "Good future candidate once there is more than one assessment source or API-driven assessment catalog support."
detail_content_backfill = "Backfill authored result-detail content for seeded sephirot still using fallback copy."
results_polish = "Add retake assessment and stronger bridges from Home summary into Results and detail."

[lessons_learned]
items = [
  "Do not tighten local JSON contracts without providing backward-safe defaults when seeded sections are still arriving gradually.",
  "Home should communicate user value, not repository or product-progress status.",
  "A dedicated per-sephira detail route adds real product value and makes Results feel less like a terminal dashboard.",
  "Keeping result-detail content in the same seeded questionnaire pipeline is simpler than inventing a second local content system.",
  "For future API-driven assessments, a library screen behind Start assessment is a better scaling path than adding a thin top-level tab too early."
]

[verification]
status = "user_reported_passed"
notes = [
  "Unit tests passed after making detail JSON fields optional with repository fallbacks.",
  "Manual checks passed for Home summary and Results detail navigation."
]

[files_to_read_first]
paths = [
  "AGENTS.md",
  "README.md",
  "docs/product_spec.md",
  "docs/refactor_roadmap.md",
  "docs/assessment_task_status.toml"
]
